services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reprography_app
    ports:
      - "8080:80"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    # Монтирование локального кода для горячей перезагрузки (активировано для разработки)
    volumes:
      - .:/var/www/html
    # Пользователь совпадает с www-data в контейнере, чтобы избежать проблем с правами
    user: www-data
    restart: unless-stopped
    networks:
      - repro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.php/documents"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: reprography_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - repro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  repro-network:
    driver: bridge