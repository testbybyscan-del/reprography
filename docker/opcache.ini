; OPcache для разработки (оптимизация производительности с горячей перезагрузкой)
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=4000
opcache.revalidate_freq=0           ; проверять каждый запрос (для разработки)
opcache.fast_shutdown=1
opcache.enable_cli=1
opcache.validate_timestamps=1       ; включить проверку времени изменения файлов (для разработки)